<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Share Pop-up Demo - HKTDC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background -->
  <div class="page-background"></div>

  <!-- Pop-up (Auto Show) -->
  <div id="overlay" class="overlay">
    <div class="popup">
      <span class="close" onclick="closePopup()">×</span>

      <!-- Title & Subtitle -->
      <h2>Share Your Attendance</h2>
      <p class="subtitle">Invite your industry peers to join.</p>

      <!-- Event Photo Area -->
      <div class="event-photo-area">
        <img src="img/event-photo.jpg" alt="Food Expo Pro | E+PLUS" class="event-photo">
        
        <div class="event-overlay">
          <div class="event-text">
            <strong>Food Expo Pro | E+PLUS</strong><br>
            HKCEC<br>
            13-15 AUG 2026 + 6-22 AUG 2026<br>
            Click2Match Online
          </div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="action-buttons">
        <button class="btn primary" onclick="downloadImage()">
          <span>↓</span> Download Image
        </button>
        <button class="btn secondary" onclick="copyShareableLink()">
          <span>⎘</span> Copy Shareable Link
        </button>
      </div>

      <!-- Social Share -->
      <p class="share-label">Or share directly:</p>
      
      <div class="share-icons">
        <div class="icon" onclick="shareToLinkedIn()"><span class="circle">in</span></div>
        <div class="icon" onclick="shareToFacebook()"><span class="circle">f</span></div>
        <div class="icon" onclick="shareToWhatsApp()"><span class="circle">WA</span></div>
        <div class="icon" onclick="shareToEmail()"><span class="circle">✉</span></div>
        <div class="icon" onclick="generateQRCode()"><span class="circle">QR</span></div>
      </div>
    </div>
  </div>

  <!-- QR Modal -->
  <div id="qrModal" class="modal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeQRModal()">×</span>
      <h3>Scan to Register</h3>
      <img id="qrImage" alt="QR Code" style="width:200px; height:200px; margin:20px auto; display:block;">
      <br>
      <button onclick="downloadQRCode()">Download QR Code</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
