<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Share Pop-up Demo - HKTDC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Language Switcher -->
  <div class="language-switcher">
    <select id="languageSelect" onchange="changeLanguage()">
      <option value="en">English</option>
      <option value="tc">繁體中文</option>
      <option value="sc">简体中文</option>
    </select>
  </div>

  <!-- Pop-up -->
  <div id="overlay" class="overlay">
    <div class="popup">
      <span class="close" onclick="closePopup()">×</span>

      <h2 id="popupTitle">Share Your Attendance</h2>
      <p class="subtitle" id="popupSubtitle">Invite your industry peers to join.</p>

      <!-- Event Photo Area -->
      <div class="event-photo-area">
        <img src="img/event-photo.jpg" alt="Event Photo" class="event-photo">
      </div>

      <!-- Buttons -->
      <div class="action-buttons">
        <button class="btn primary" onclick="downloadImage()" id="downloadBtn">
          ↓ Download Image
        </button>
        <button class="btn secondary" onclick="copyShareableLink()" id="copyBtn">
          ⎘ Copy Shareable Link
        </button>
      </div>

      <p class="share-label" id="shareLabel">Or share directly:</p>
      
      <div class="share-icons">
        <div class="icon" onclick="shareToLinkedIn()"><span class="circle">in</span></div>
        <div class="icon" onclick="shareToFacebook()"><span class="circle">f</span></div>
        <div class="icon" onclick="shareToWhatsApp()"><span class="circle">WA</span></div>
        <div class="icon" onclick="shareToEmail()"><span class="circle">✉</span></div>
        <div class="icon" onclick="generateQRCode()"><span class="circle">QR</span></div>
      </div>
    </div>
  </div>

  <!-- QR Modal -->
  <div id="qrModal" class="modal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeQRModal()">×</span>
      <h3>Scan to Register</h3>
      <img id="qrImage" alt="QR Code" style="width:200px; height:200px; margin:20px auto; display:block;">
      <br>
      <button onclick="downloadQRCode()">Download QR Code</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
