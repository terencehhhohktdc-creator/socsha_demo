<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Share Pop-up Demo - HKTDC</title>
  <link rel="icon" href="data:,">

  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="HKTDC Social Sharing Demo" />
  <meta property="og:description" content="Demo of post-registration social sharing pop-up with multiple copywriting options and languages." />
  <meta property="og:image" content="https://terencehhhohktdc-creator.github.io/socsha_demo/img/event-photo.jpg" />
  <meta property="og:url" content="https://terencehhhohktdc-creator.github.io/socsha_demo/" />
  <meta property="og:type" content="website" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="HKTDC Social Sharing Demo" />
  <meta name="twitter:description" content="Demo of post-registration social sharing pop-up." />
  <meta name="twitter:image" content="https://terencehhhohktdc-creator.github.io/socsha_demo/img/event-photo.jpg" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Clean Switcher -->
  <div class="switcher-container">
    <select id="optionSelect" onchange="updatePopup()">
      <option value="1">Option 1 - Share Your Attendance</option>
      <option value="2">Option 2 - Let Your Peers Know</option>
      <option value="3">Option 3 - You're Attending</option>
    </select>

    <select id="languageSelect" onchange="updatePopup()">
      <option value="en">English</option>
      <option value="tc">繁體中文</option>
      <option value="sc">简体中文</option>
    </select>
  </div>

  <!-- Pop-up -->
  <div id="overlay" class="overlay">
    <div class="popup">
      <span class="close" onclick="closePopup()">×</span>

      <h2 id="popupTitle">Share Your Attendance</h2>
      <p class="subtitle" id="popupSubtitle">Invite your industry peers to join.</p>

      <!-- Event Photo Area -->
      <div class="event-photo-area">
        <img id="eventPhoto" alt="Event Photo" class="event-photo">
      </div>

      <!-- Incentive Program Button (Moved Here) -->
      <button class="btn incentive" onclick="openIncentiveProgram()">
        🎁 Learn about Incentive Program
      </button>

      <!-- Action Buttons -->
      <div class="action-buttons">
        <button class="btn primary" onclick="downloadImage()" id="downloadBtn">
          ↓ Download Image
        </button>
        <button class="btn secondary" onclick="copyShareableLink()" id="copyBtn">
          ⎘ Copy Shareable Link
        </button>
      </div>

      <!-- Social Share -->
      <p class="share-label" id="shareLabel">Or share directly:</p>
      
      <div class="share-icons">
        <div class="icon linkedin" onclick="shareToLinkedIn()">
          <i class="fab fa-linkedin-in"></i>
        </div>
        <div class="icon facebook" onclick="shareToFacebook()">
          <i class="fab fa-facebook-f"></i>
        </div>
        <div class="icon whatsapp" onclick="shareToWhatsApp()">
          <i class="fab fa-whatsapp"></i>
        </div>
        <div class="icon email" onclick="shareToEmail()">
          <i class="fas fa-envelope"></i>
        </div>
        <div class="icon x" onclick="shareToX()">
          <i class="fab fa-x-twitter"></i>
        </div>
        <div class="icon threads" onclick="shareToThreads()">
          <i class="fab fa-threads"></i>
        </div>
        <div class="icon qr" onclick="generateQRCode()">
          <i class="fas fa-qrcode"></i>
        </div>
      </div>
    </div>
  </div>

  <!-- QR Modal -->
  <div id="qrModal" class="modal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeQRModal()">×</span>
      <h3>Scan to Register</h3>
      <img id="qrImage" alt="QR Code" style="width:200px; height:200px; margin:20px auto; display:block;">
      <br>
      <button onclick="downloadQRCode()">Download QR Code</button>
    </div>
  </div>

  <script src="js/images.js"></script>
  <script src="js/translations.js"></script>
  <script src="script.js"></script>
</body>
</html>
